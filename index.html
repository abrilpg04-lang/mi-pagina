<!DOCTYPE html>
<html>
<head>
    <title>Mi página bonita</title>
    <style>
        body{
            background-color: #f2f6ff;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        h1{
            color: #2a4d9b;
        }
        p{
            color: #333;
            font-size: 18px;
        }
        .caja{
            background-color: white;
            width: 300px;
            margin: auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }
        a{
            display: inline-block;
            margin-top: 10px;
            padding: 10px;
            background-color: #2a4d9b;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="caja">
        <h1>Hola 👋</h1>
        <p>Soy Abril y esta es mi página web.</p>
        <a href="#">Mi botón</a>
    </div>

</body>
</html>
