<!DOCTYPE html>
<html>

        }

        }

<body>

        <img src="https://images.unsplash.com/photo-1461360228754-6e81c478b882" alt="Historia">
    </div>

    <div class="materia">
        <h3>Formación socioemocional VI</h3>
        <img src="https://images.unsplash.com/photo-1516302752625-fcc3c50ae61f" alt="Socioemocional">

    <div class="materia">
        <h3>Temas selectos de Matemáticas III</h3>

</html>
